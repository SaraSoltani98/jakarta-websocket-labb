<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">
<h:head>
    <title>Chat</title>
</h:head>
<h:body>
    <h2>WebSocket-klient</h2>
    <p>Inloggad som: <span id="loggedUser">#{appUserloginBean.loggedInUser.username}</span></p>
    <div>
        Status: <span id="status">DISCONNECTED</span>
    </div>
    <div>
        <input id="input" type="text" placeholder="Skriv ett meddelande..."/>
        <button id="sendBtn" type="button">Skicka</button>
        <button type="button" onclick="disconnect()">Disconnect</button>
    </div>
    <pre id="log"></pre>

    <h:form>
        <h:commandButton value="Logout" action="#{appUserloginBean.logout}"/>
    </h:form>

    <script>
        const statusEl = document.getElementById("status");
        const logEl = document.getElementById("log");
        const inputEl = document.getElementById("input");
        const sendBtn = document.getElementById("sendBtn");
        const username = document.getElementById("loggedUser").textContent;

        const wsUrl = "ws://localhost:8080/websocket-labb1-1.0-SNAPSHOT/chat";
        const socket = new WebSocket(wsUrl);

        socket.addEventListener("open", () => {
            statusEl.textContent = "CONNECTED";
            logEl.textContent += "Connected\n";
        });

        socket.addEventListener("message", (event) => {
            logEl.textContent += event.data + "\n";
        });

        socket.addEventListener("close", () => {
            statusEl.textContent = "DISCONNECTED";
            logEl.textContent += "Disconnected\n";
        });

        socket.addEventListener("error", () => {
            statusEl.textContent = "ERROR";
            logEl.textContent += "Error occurred\n";
        });

        sendBtn.addEventListener("click", () => {
            const msg = inputEl.value;
            if (!msg) return;

            socket.send(username + ": " + msg);
            inputEl.value = "";
        });

        function disconnect() {
            socket.close();
        }
    </script>

</h:body>
</html>
