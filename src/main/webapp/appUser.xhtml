<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>App Users</title>
</h:head>

<h:body>

    <h2>Create User</h2>

    <h:form>
        <h:inputText value="#{appUserBean.username}" placeholder="Username"/>
        <br/><br/>
        <h:inputSecret value="#{appUserBean.password}" placeholder="Password"/>
        <br/><br/>
        <h:commandButton value="Spara" action="#{appUserBean.saveAppUser}"/>
    </h:form>

    <h2>Alla användare</h2>

    <h:dataTable value="#{appUserBean.appUsers}" var="user" border="1">
        <h:column>
            <f:facet name="header">ID</f:facet>
            #{user.id}
        </h:column>
        <h:column>
            <f:facet name="header">Username</f:facet>
            #{user.username}
        </h:column>
    </h:dataTable>

</h:body>

</html>
