<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets">

<h:head>
    <title>App Users</title>
</h:head>

<h:body>

    <h2>Create User</h2>

    <h:form>
        <h:inputText value="#{appUserBean.username}" placeholder="Username"/>
        <br/><br/>
        <h:inputSecret value="#{appUserBean.password}" placeholder="Password"/>
        <br/><br/>
        <h:commandButton value="Spara" action="#{appUserBean.saveAppUser}"/>
    </h:form>

    <h2>Alla användare</h2>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Username</th>
        </tr>
        <ui:repeat value="#{appUserBean.appUsers}" var="user">
            <tr>
                <td>#{user.id}</td>
                <td>#{user.username}</td>
            </tr>
        </ui:repeat>
    </table>

</h:body>
</html>
